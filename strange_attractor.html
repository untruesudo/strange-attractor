<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strange Attractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #04050a; --panel: #0a0c14; --border: #1a1f2e;
    --accent: #00ffe0; --accent2: #ff4d6d; --text: #8899bb; --bright: #ccd6f6;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px; overflow-x: hidden;
  }
  header {
    width: 100%; max-width: 920px;
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px;
  }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:2.6rem; letter-spacing:0.12em; color:var(--bright); }
  .tag { font-size:0.7rem; color:var(--accent); border:1px solid var(--accent); padding:2px 8px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.8; }
  .layout { display:flex; gap:20px; width:100%; max-width:920px; align-items:flex-start; }
  canvas { background:#020308; border:1px solid var(--border); flex-shrink:0; box-shadow:0 0 40px rgba(0,255,224,0.05); }
  .sidebar { flex:1; display:flex; flex-direction:column; gap:12px; min-width:200px; }
  .panel { background:var(--panel); border:1px solid var(--border); padding:14px; }
  .panel-title { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  .param-row { display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
  .param-row:last-child { margin-bottom:0; }
  .param-label { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--text); }
  .param-label span:last-child { color:var(--bright); font-size:0.78rem; }
  input[type="range"] { -webkit-appearance:none; width:100%; height:2px; background:var(--border); outline:none; cursor:pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:var(--accent); border-radius:0; cursor:pointer; box-shadow:0 0 8px var(--accent); }
  .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
  button {
    font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:0.12em;
    text-transform:uppercase; padding:8px 14px; border:1px solid var(--accent);
    background:transparent; color:var(--accent); cursor:pointer; transition:all 0.15s; flex:1;
  }
  button:hover { background:var(--accent); color:#000; box-shadow:0 0 12px var(--accent); }
  button.danger { border-color:var(--accent2); color:var(--accent2); }
  button.danger:hover { background:var(--accent2); color:#fff; box-shadow:0 0 12px var(--accent2); }
  .presets { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .preset-btn { font-size:0.62rem; padding:6px 8px; border:1px solid var(--border); color:var(--text); border-radius:0; }
  .preset-btn:hover { border-color:var(--accent); color:var(--accent); background:transparent; box-shadow:none; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:0.68rem; }
  .stat-box { background:var(--bg); border:1px solid var(--border); padding:8px; }
  .stat-label { color:var(--text); font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; }
  .stat-value { color:var(--bright); font-size:0.9rem; margin-top:2px; }
  select { font-family:'Share Tech Mono',monospace; font-size:0.72rem; background:var(--bg); border:1px solid var(--border); color:var(--bright); padding:6px 8px; width:100%; cursor:pointer; outline:none; margin-bottom:8px; }
  .progress-bar { height:2px; background:var(--border); width:100%; margin-top:8px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); width:0%; transition:width 0.1s; box-shadow:0 0 8px var(--accent); }
  .anim-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
  .anim-btn { font-size:0.65rem; padding:8px 6px; border:1px solid var(--border); color:var(--text); flex:1; }
  .anim-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,255,224,0.05); box-shadow:none; }
  .anim-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,255,224,0.1); box-shadow:0 0 12px rgba(0,255,224,0.2) !important; }
  .pulse-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-right:5px; animation:blink 1s infinite; vertical-align:middle; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
  @media (max-width: 720px) { .layout { flex-direction:column; } canvas { width:100% !important; } }
</style>
</head>
<body>

<header>
  <h1>Strange Attractor</h1>
  <span class="tag">Clifford / Peter de Jong</span>
</header>

<div class="layout">
  <canvas id="canvas" width="620" height="620"></canvas>
  <div class="sidebar">

    <div class="panel">
      <div class="panel-title">Attractor Type</div>
      <select id="attractorType" onchange="onTypeChange()">
        <option value="clifford">Clifford</option>
        <option value="dejong">Peter de Jong</option>
        <option value="bedhead">Bedhead</option>
      </select>
      <div class="panel-title" style="margin-top:8px">Presets</div>
      <div class="presets" id="presets"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Parameters</div>
      <div id="sliders"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Animation</div>
      <div class="anim-grid">
        <button class="anim-btn" id="btnTrails" onclick="toggleAnim('trails')">▶ Trails</button>
        <button class="anim-btn" id="btnMorph"  onclick="toggleAnim('morph')">▶ Morph</button>
      </div>
      <div class="param-row">
        <div class="param-label"><span>Speed</span><span id="animSpeedLabel">1.0x</span></div>
        <input type="range" id="animSpeed" min="0.1" max="4" step="0.1" value="1"
          oninput="document.getElementById('animSpeedLabel').textContent=parseFloat(this.value).toFixed(1)+'x'">
      </div>
      <div class="param-row">
        <div class="param-label"><span>Trail Fade</span><span id="fadeLabel">0.04</span></div>
        <input type="range" id="fadeSetting" min="0.005" max="0.3" step="0.005" value="0.04"
          oninput="document.getElementById('fadeLabel').textContent=this.value">
      </div>
      <div id="animStatus" style="font-size:0.64rem;color:var(--text);margin-top:6px;min-height:14px;letter-spacing:0.05em;"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Render</div>
      <div class="param-row">
        <div class="param-label"><span>Points</span><span id="ptsLabel">1,200,000</span></div>
        <input type="range" id="numPts" min="100000" max="3000000" step="100000" value="1200000"
          oninput="document.getElementById('ptsLabel').textContent=parseInt(this.value).toLocaleString(); scheduleRender()">
      </div>
      <div class="param-row">
        <div class="param-label"><span>Brightness</span><span id="brLabel">1.6</span></div>
        <input type="range" id="brightness" min="0.5" max="5" step="0.1" value="1.6"
          oninput="document.getElementById('brLabel').textContent=this.value; scheduleRender()">
      </div>
      <div class="param-row">
        <div class="param-label"><span>Color Scheme</span></div>
        <select id="colorScheme" onchange="scheduleRender()">
          <option value="cyan">Cyan Plasma</option>
          <option value="fire">Fire</option>
          <option value="aurora">Aurora</option>
          <option value="bone">Bone</option>
          <option value="neon">Neon Coral</option>
        </select>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="panel">
      <div class="panel-title">Controls</div>
      <div class="btn-row" style="margin-bottom:8px">
        <button onclick="randomize()">Randomize</button>
        <button onclick="staticRender()">Re-render</button>
      </div>
      <div class="btn-row">
        <button onclick="saveImage()">Save PNG</button>
        <button class="danger" onclick="resetParams()">Reset</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Info</div>
      <div class="stats">
        <div class="stat-box"><div class="stat-label">Points</div><div class="stat-value" id="statPts">-</div></div>
        <div class="stat-box"><div class="stat-label">Time</div><div class="stat-value" id="statTime">-</div></div>
        <div class="stat-box"><div class="stat-label">Type</div><div class="stat-value" id="statType">-</div></div>
        <div class="stat-box"><div class="stat-label">Status</div><div class="stat-value" id="statStatus">idle</div></div>
      </div>
    </div>

  </div>
</div>

<script>
const ATTRACTORS = {
  clifford: {
    params: ['a','b','c','d'],
    defaults: [-1.7, 1.3, -0.1, -1.2],
    range: [-3, 3],
    step: (x, y, p) => [
      Math.sin(p[0]*y) + p[2]*Math.cos(p[0]*x),
      Math.sin(p[1]*x) + p[3]*Math.cos(p[1]*y)
    ],
    presets: [
      { name:'Classic',  p:[-1.7, 1.3,-0.1,-1.2] },
      { name:'Spiral',   p:[-1.4,-1.6, 1.0, 0.7] },
      { name:'Feather',  p:[-1.3, 1.7,-0.6,-1.2] },
      { name:'Vortex',   p:[ 2.0,-2.0, 0.5,-0.5] },
    ]
  },
  dejong: {
    params: ['a','b','c','d'],
    defaults: [1.4, -2.3, 2.4, -2.1],
    range: [-3.2, 3.2],
    step: (x, y, p) => [
      Math.sin(p[0]*y) - Math.cos(p[1]*x),
      Math.sin(p[2]*x) - Math.cos(p[3]*y)
    ],
    presets: [
      { name:'Whisper',  p:[1.4,-2.3, 2.4,-2.1] },
      { name:'Galaxy',   p:[-2.7, 2.0,-0.9,-1.4] },
      { name:'Lace',     p:[ 2.01,-2.53, 1.61,-0.33] },
      { name:'Knot',     p:[-2.24, 0.43,-0.65,-2.43] },
    ]
  },
  bedhead: {
    params: ['a','b'],
    defaults: [-0.81, -0.92],
    range: [-1, 1],
    step: (x, y, p) => [
      Math.sin(x*y/p[1])*y + Math.cos(p[0]*x - y),
      x + Math.sin(y)/p[1]
    ],
    presets: [
      { name:'Default',  p:[-0.81,-0.92] },
      { name:'Waves',    p:[-0.64,-0.72] },
      { name:'Tangle',   p:[ 0.55,-0.89] },
      { name:'Curl',     p:[-0.29, 0.97] },
    ]
  }
};

function getColor(t, scheme) {
  t = Math.min(1, Math.max(0, t));
  switch(scheme) {
    case 'cyan':   return [t*20, t*180+20, t*200+55];
    case 'fire':   return [t*255, t*160, t*30];
    case 'aurora': return [t*30+10, t*200+20, t*120+80];
    case 'bone':   return [t*180+40, t*175+45, t*200+50];
    case 'neon':   return [t*255, t*80, t*180];
  }
}

function getColorHue(phase, scheme) {
  const s = Math.sin(phase), c = Math.cos(phase);
  switch(scheme) {
    case 'cyan':   return [s*15+5,   130+c*60,  200+s*40];
    case 'fire':   return [220+s*35, 80+c*70,   10+s*10];
    case 'aurora': return [10+s*20,  160+c*80,  100+s*80];
    case 'bone':   return [150+s*40, 150+c*40,  180+s*40];
    case 'neon':   return [200+s*55, 30+c*20,   160+s*80];
  }
}

let currentParams = [...ATTRACTORS.clifford.defaults];
let renderTimer = null;
let animMode = null;
let animRAF = null;
let trailState = { x:0.1, y:0.1, frame:0, bounds:null };
let morphState = { src:null, dst:null, t:0 };

function getType() { return document.getElementById('attractorType').value; }

function buildUI() {
  const type = getType();
  const def = ATTRACTORS[type];
  const container = document.getElementById('sliders');
  container.innerHTML = '';
  def.params.forEach((name, i) => {
    const val = (currentParams[i] !== undefined) ? currentParams[i] : def.defaults[i];
    container.innerHTML += `
      <div class="param-row">
        <div class="param-label"><span>${name}</span><span id="lbl_${name}">${val.toFixed(3)}</span></div>
        <input type="range" id="sl_${name}" min="${def.range[0]}" max="${def.range[1]}" step="0.001"
          value="${val}" oninput="onSlider('${name}',${i},this.value)">
      </div>`;
  });
  const pDiv = document.getElementById('presets');
  pDiv.innerHTML = '';
  def.presets.forEach(pr => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = pr.name;
    btn.onclick = () => applyPreset(pr.p);
    pDiv.appendChild(btn);
  });
}

function syncSliders() {
  const type = getType();
  const def = ATTRACTORS[type];
  def.params.forEach((name, i) => {
    const sl = document.getElementById('sl_'+name);
    const lb = document.getElementById('lbl_'+name);
    if (sl) { sl.value = currentParams[i]; lb.textContent = currentParams[i].toFixed(3); }
  });
}

function onSlider(name, idx, val) {
  currentParams[idx] = parseFloat(val);
  document.getElementById('lbl_'+name).textContent = parseFloat(val).toFixed(3);
  if (animMode === 'morph') return;
  if (animMode === 'trails') { recomputeTrailBounds(); return; }
  scheduleRender();
}

function onTypeChange() {
  stopAnim();
  const type = getType();
  currentParams = [...ATTRACTORS[type].defaults];
  buildUI();
  staticRender();
}

function applyPreset(p) {
  stopAnim();
  currentParams = [...p];
  buildUI();
  staticRender();
}

// ── Animation ──────────────────────────────────────────────────────────────────
function toggleAnim(mode) {
  if (animMode === mode) { stopAnim(); return; }
  stopAnim();
  animMode = mode;
  const label = mode === 'trails' ? 'Trails' : 'Morph';
  document.getElementById('btn'+label).classList.add('active');
  document.getElementById('btn'+label).textContent = '■ ' + label;
  document.getElementById('animStatus').innerHTML =
    '<span class="pulse-dot"></span>' + (mode === 'trails' ? 'streaming particles' : 'morphing parameters');
  document.getElementById('statStatus').textContent = mode;
  if (mode === 'trails') startTrails();
  else startMorph();
}

function stopAnim() {
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
  animMode = null;
  ['Trails','Morph'].forEach(m => {
    const btn = document.getElementById('btn'+m);
    if (btn) { btn.classList.remove('active'); btn.textContent = '▶ '+m; }
  });
  document.getElementById('animStatus').textContent = '';
  document.getElementById('statStatus').textContent = 'idle';
}

function computeBounds(def, p, samples) {
  let x=0.1, y=0.1;
  for(let i=0;i<500;i++) [x,y]=def.step(x,y,p);
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(let i=0;i<samples;i++){
    [x,y]=def.step(x,y,p);
    if(x<minX)minX=x; if(x>maxX)maxX=x;
    if(y<minY)minY=y; if(y>maxY)maxY=y;
  }
  const pad=0.1, rx=maxX-minX, ry=maxY-minY;
  return {minX:minX-rx*pad, maxX:maxX+rx*pad, minY:minY-ry*pad, maxY:maxY+ry*pad};
}

function recomputeTrailBounds() {
  const def = ATTRACTORS[getType()];
  trailState.bounds = computeBounds(def, currentParams, 40000);
}

// Trails mode: stream points with color cycling and fade
function startTrails() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#020308';
  ctx.fillRect(0, 0, W, H);

  const def = ATTRACTORS[getType()];
  trailState.x = 0.1; trailState.y = 0.1; trailState.frame = 0;
  trailState.bounds = computeBounds(def, currentParams, 50000);
  for(let i=0;i<500;i++) [trailState.x, trailState.y] = def.step(trailState.x, trailState.y, currentParams);

  function loop() {
    if (animMode !== 'trails') return;
    const speed  = parseFloat(document.getElementById('animSpeed').value);
    const fade   = parseFloat(document.getElementById('fadeSetting').value);
    const scheme = document.getElementById('colorScheme').value;
    const b = trailState.bounds;
    const ptsPerFrame = Math.floor(2500 * speed);

    ctx.fillStyle = `rgba(2,3,8,${fade})`;
    ctx.fillRect(0, 0, W, H);

    const imgData = ctx.getImageData(0, 0, W, H);
    const d = imgData.data;
    const phase0 = trailState.frame * 0.06 * speed;

    for (let i = 0; i < ptsPerFrame; i++) {
      [trailState.x, trailState.y] = def.step(trailState.x, trailState.y, currentParams);
      const px = Math.floor((trailState.x - b.minX) / (b.maxX - b.minX) * (W-1));
      const py = Math.floor((trailState.y - b.minY) / (b.maxY - b.minY) * (H-1));
      if (px>=0 && px<W && py>=0 && py<H) {
        const [r,g,bl] = getColorHue(phase0 + i*0.002, scheme);
        const idx = (py*W+px)*4;
        d[idx]   = Math.min(255, d[idx]   + r * 0.55);
        d[idx+1] = Math.min(255, d[idx+1] + g * 0.55);
        d[idx+2] = Math.min(255, d[idx+2] + bl* 0.55);
        d[idx+3] = 255;
      }
    }
    ctx.putImageData(imgData, 0, 0);
    trailState.frame++;
    document.getElementById('statPts').textContent = (trailState.frame * ptsPerFrame).toLocaleString();
    animRAF = requestAnimationFrame(loop);
  }
  animRAF = requestAnimationFrame(loop);
}

// Morph mode: smoothly interpolate between random parameter sets
function startMorph() {
  const type = getType();
  const def = ATTRACTORS[type];
  morphState.src = [...currentParams];
  morphState.dst = def.params.map(() => def.range[0] + Math.random()*(def.range[1]-def.range[0]));
  morphState.t = 0;

  function loop() {
    if (animMode !== 'morph') return;
    const speed = parseFloat(document.getElementById('animSpeed').value);
    morphState.t += 0.0035 * speed;

    if (morphState.t >= 1) {
      morphState.t = 0;
      morphState.src = [...morphState.dst];
      morphState.dst = def.params.map(() => def.range[0] + Math.random()*(def.range[1]-def.range[0]));
    }

    const t = morphState.t;
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    currentParams = morphState.src.map((s, i) => s + (morphState.dst[i]-s)*ease);
    syncSliders();
    renderFastFrame();
    animRAF = requestAnimationFrame(loop);
  }
  animRAF = requestAnimationFrame(loop);
}

function renderFastFrame() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const def = ATTRACTORS[getType()];
  const p = currentParams;
  const scheme = document.getElementById('colorScheme').value;
  const brightness = parseFloat(document.getElementById('brightness').value);
  const numPts = 350000;

  const b = computeBounds(def, p, 25000);
  let x=0.1, y=0.1;
  for(let i=0;i<300;i++) [x,y]=def.step(x,y,p);

  const counts = new Float32Array(W*H);
  for(let i=0;i<numPts;i++){
    [x,y]=def.step(x,y,p);
    const px=Math.floor((x-b.minX)/(b.maxX-b.minX)*(W-1));
    const py=Math.floor((y-b.minY)/(b.maxY-b.minY)*(H-1));
    if(px>=0&&px<W&&py>=0&&py<H) counts[py*W+px]++;
  }

  let maxC=0;
  for(let k=0;k<counts.length;k++) if(counts[k]>maxC) maxC=counts[k];
  const logMax=Math.log(maxC+1);
  const imgData=ctx.createImageData(W,H);
  const d=imgData.data;
  for(let k=0;k<counts.length;k++){
    if(!counts[k]) continue;
    const t=Math.pow(Math.log(counts[k]+1)/logMax, 1/brightness);
    const [r,g,bv]=getColor(t,scheme);
    d[k*4]=r; d[k*4+1]=g; d[k*4+2]=bv; d[k*4+3]=255;
  }
  ctx.putImageData(imgData,0,0);
  document.getElementById('statPts').textContent = numPts.toLocaleString();
}

// Static high-quality render
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(staticRender, 300);
}

function staticRender() {
  if (animMode) stopAnim();
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const type = getType();
  const def = ATTRACTORS[type];
  const numPts = parseInt(document.getElementById('numPts').value);
  const brightness = parseFloat(document.getElementById('brightness').value);
  const colorScheme = document.getElementById('colorScheme').value;

  document.getElementById('statStatus').textContent = 'rendering';
  document.getElementById('statType').textContent = type;
  const t0 = performance.now();

  const b = computeBounds(def, currentParams, 50000);
  const counts = new Float32Array(W * H);
  let x=0.1, y=0.1;
  for(let i=0;i<500;i++) [x,y]=def.step(x,y,currentParams);

  const CHUNK = 150000;
  let i = 0;
  let raf = null;

  function runChunk() {
    const end = Math.min(i + CHUNK, numPts);
    for (; i < end; i++) {
      [x,y] = def.step(x, y, currentParams);
      const px = Math.floor((x-b.minX)/(b.maxX-b.minX)*(W-1));
      const py = Math.floor((y-b.minY)/(b.maxY-b.minY)*(H-1));
      if (px>=0 && px<W && py>=0 && py<H) counts[py*W+px]++;
    }
    document.getElementById('progress').style.width = (i/numPts*100)+'%';
    if (i < numPts) { raf = requestAnimationFrame(runChunk); return; }

    let maxC=0;
    for(let k=0;k<counts.length;k++) if(counts[k]>maxC) maxC=counts[k];
    const logMax=Math.log(maxC+1);
    const imgData=ctx.createImageData(W,H);
    const d=imgData.data;
    for(let k=0;k<counts.length;k++){
      if(!counts[k]) continue;
      const t=Math.pow(Math.log(counts[k]+1)/logMax, 1/brightness);
      const [r,g,bv]=getColor(t,colorScheme);
      d[k*4]=r; d[k*4+1]=g; d[k*4+2]=bv; d[k*4+3]=255;
    }
    ctx.putImageData(imgData,0,0);

    const elapsed = ((performance.now()-t0)/1000).toFixed(2)+'s';
    document.getElementById('statPts').textContent = numPts.toLocaleString();
    document.getElementById('statTime').textContent = elapsed;
    document.getElementById('statStatus').textContent = 'done';
    document.getElementById('progress').style.width = '100%';
    setTimeout(()=>document.getElementById('progress').style.width='0%', 800);
  }
  requestAnimationFrame(runChunk);
}

function randomize() {
  stopAnim();
  const type = getType();
  const def = ATTRACTORS[type];
  const [lo, hi] = def.range;
  currentParams = def.params.map(() => lo + Math.random()*(hi-lo));
  buildUI();
  staticRender();
}

function resetParams() {
  stopAnim();
  const type = getType();
  currentParams = [...ATTRACTORS[type].defaults];
  buildUI();
  staticRender();
}

function saveImage() {
  const a = document.createElement('a');
  a.download = `attractor_${getType()}_${Date.now()}.png`;
  a.href = document.getElementById('canvas').toDataURL('image/png');
  a.click();
}

buildUI();
staticRender();
</script>
